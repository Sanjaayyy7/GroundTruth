# The reliability gate gates itself: tests, the demo suite, detector-quality
# measurement, and the safety-regression check all run on every push.
# The live-Ollama integration test auto-skips (no server in CI).
name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the evidence audit verifies commit existence (CT6)
          # and preregistration ancestry (D10); a shallow clone breaks both.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q
      - name: Demo suite must stay clean for the hardened agent
        run: groundtruth run --agent hardened_agent
      - name: Detector quality report
        run: groundtruth validate
      - name: Safety regression gate (vulnerable agent vs stored baseline)
        run: groundtruth ci --agent vulnerable_agent
      - name: Safety regression gate (hardened agent vs stored baseline)
        run: groundtruth ci --agent hardened_agent
      - name: Evidence audit (contracts + quality manifest + assurance report)
        run: groundtruth audit
      - name: Evidence audit of the second consumer (v0.7 external validation)
        run: groundtruth audit --root examples/minijudge --name minijudge
      - name: Repository steward (Constitution RC1-RC8; blocking, Law 10 exits only)
        run: groundtruth steward
      - name: Committed evidence is byte-fresh (debt 17 — a stale manifest fails loudly)
        run: git diff --exit-code runs/ examples/minijudge/runs/
