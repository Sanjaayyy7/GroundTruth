# three times and still never answered) now carry `non_completion`. Descriptions
# keep their v1 wording ("no current-vocabulary label applies") as the historical
# record of when the taxonomy hole was found. Cause attribution — the stalls are
# manufactured by stateless observation — lives in experiments/stall_confounds/.
