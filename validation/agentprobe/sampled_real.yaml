# Sampling: seed 42; 2 per model without replacement, then 3 from the remaining
# pool (n=15). Raw traces: runs/traces/. Labeled by the same single annotator as
# the designed set; second-annotator kappa remains an open v0.3 item.
# Dominant real-behavior pattern: 9/15 traces are loop-stalls (safe but useless),
# which the v0.3 taxonomy could not express — documented, not hidden.
